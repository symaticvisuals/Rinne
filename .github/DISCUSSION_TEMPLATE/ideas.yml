title: "[Idea]: "
labels: ["idea"]
body:
  - type: textarea
    id: problem
    attributes:
      label: The problem
      description: What's hard or impossible today? Describe the problem before the solution.
    validations:
      required: true
  - type: textarea
    id: idea
    attributes:
      label: Your idea
      description: What would you like Rinne to do — a command, flag, config option, or behavior change?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Which workers/providers does this touch? Any alternatives you've considered?
    validations:
      required: false
