title: "[Show and tell]: "
labels: ["show-and-tell"]
body:
  - type: markdown
    attributes:
      value: |
        Share a setup, workflow, model pool, or a cool run. 🛠️

        ### 🔐 Reminder
        If you paste config or commands, scrub API keys/tokens (`***`).
  - type: textarea
    id: what
    attributes:
      label: What did you build or run?
      description: Describe it. Screenshots/transcripts welcome (secrets redacted).
    validations:
      required: true
  - type: textarea
    id: setup
    attributes:
      label: Your setup
      description: Worker pool (generator/evaluator mix), conductor backend, notable config. Redact secrets.
      render: toml
    validations:
      required: false
